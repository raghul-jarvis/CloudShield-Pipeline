name: Continuous Integration & Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Validate Infrastructure Definitions
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
      - run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  build-and-ship:
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Configure Production Engine Environments
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Context Registries
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compile and Output Container Manifests
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-web-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-web-app:${{ github.sha }}